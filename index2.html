    <title>Brody Nguyen Studios</title>
    <style>
        /* CSS STYLES */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0b;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Use min-height so the page can grow and scroll */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Pushes content toward middle but padding-top keeps nav visible */
            justify-content: center; 
            padding: 40px 0;
            overflow: auto;
        }

        nav {
            margin-bottom: 40px;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #00f2ff;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #00f2ff;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background-color: #00f2ff;
            color: #000;
            box-shadow: 0 0 10px #00f2ff, 0 0 30px #00f2ff;
            transform: translateY(-2px);
        }

        .main-title {
            font-size: 5.5rem;
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; }
            .nav-links { flex-direction: column; align-items: center; }
        }
    </style>
